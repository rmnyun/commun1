<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Report Submitted</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div class="app-shell">
    <!-- Top bar -->
    <header class="top-bar">
      <div class="logo-block">
        <span class="logo-top">THE NEW SCHOOL</span>
        <span class="logo-bottom">IRL</span>
      </div>
      <button class="icon-button" aria-label="Inbox / Messages">
        <span class="envelope"></span>
      </button>
    </header>

    <main class="confirm-main">
      <h1 class="page-title">Report</h1>

      <div class="confirm-icon" aria-hidden="true"></div>

      <h2 class="confirm-title">We are currently<br />reviewing your request</h2>

      <p class="confirm-subtext">Thank you for your response!</p>
      <p class="confirm-subtext confirm-subtext--muted">
        While we review the account, here is what you can do in the meantime:
      </p>

      <div class="confirm-actions">
        <button class="confirm-row" type="button" onclick="window.location.href='report.html'">
          <span>Report for another activity</span>
          <span class="confirm-chevron">›</span>
        </button>

        <button class="confirm-row" type="button" onclick="window.location.href='index.html'">
          <span>Return to our service</span>
          <span class="confirm-chevron">›</span>
        </button>
      </div>
    </main>
  </div>
</body>
</html>
