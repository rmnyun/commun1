<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Report Account</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div class="app-shell">
    <!-- Top bar -->
    <header class="top-bar">
      <div class="logo-block">
        <span class="logo-top">THE NEW SCHOOL</span>
        <span class="logo-bottom">IRL</span>
      </div>
      <button class="icon-button" aria-label="Inbox / Messages">
        <span class="envelope"></span>
      </button>
    </header>

    <main class="report-main">
      <h1 class="page-title">Report</h1>

      <section class="report-section">
        <h2 class="report-question">Why are you reporting this account?</h2>
        <p class="report-subtext">
          Your report is anonymous, feel free to contact us if there are any issues – don't wait!
        </p>

        <ul class="report-list">
          <li class="report-item">
            <button class="report-option" data-reason="harassment">
              <span>Harassment or bullying</span>
              <span class="report-radio"></span>
            </button>
          </li>
          <li class="report-item">
            <button class="report-option" data-reason="not-from-school">
              <span>May not be from this school</span>
              <span class="report-radio"></span>
            </button>
          </li>
          <li class="report-item">
            <button class="report-option" data-reason="violence">
              <span>Violence or threat of violence</span>
              <span class="report-radio"></span>
            </button>
          </li>
          <li class="report-item">
            <button class="report-option" data-reason="hate-speech">
              <span>Hate speech or symbols</span>
              <span class="report-radio"></span>
            </button>
          </li>
          <li class="report-item">
            <button class="report-option" data-reason="impersonation">
              <span>Pretending to be someone else</span>
              <span class="report-radio"></span>
            </button>
          </li>
          <li class="report-item">
            <button class="report-option" data-reason="hacked">
              <span>Account been hacked</span>
              <span class="report-radio"></span>
            </button>
          </li>
          <li class="report-item">
            <button class="report-option" data-reason="other">
              <span>Other</span>
              <span class="report-radio"></span>
            </button>
          </li>
        </ul>

        <button class="report-next-button">NEXT</button>
      </section>
    </main>
  </div>

<script>
  // nothing selected by default; only one option at a time;
  // NEXT goes to different pages depending on selected reason
  (function () {
    const options = document.querySelectorAll('.report-option');
    const nextBtn = document.querySelector('.report-next-button');
    let selectedReason = null;

    options.forEach((opt) => {
      opt.addEventListener('click', () => {
        options.forEach((o) => o.classList.remove('report-option--selected'));
        opt.classList.add('report-option--selected');
        selectedReason = opt.getAttribute('data-reason');
      });
    });

    nextBtn.addEventListener('click', () => {
      if (!selectedReason) return;

      if (selectedReason === 'harassment') {
        window.location.href = 'report-harassment.html';
      } else if (selectedReason === 'other') {
        window.location.href = 'report-other.html';
      } else if (selectedReason === 'impersonation') {
        window.location.href = 'report-impersonation.html';
      }
    });
  })();
</script>
        
        // you can add other navigation cases here later if needed
      });
    })();
  </script>
</body>
</html>
