<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages</title>
    <style>
        /* Base Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #000; }
        
        .screen-container { width: 390px; height: 844px; background-color: #ffffff; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; border-radius: 40px; border: 8px solid #333; }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 25px; background-color: #333; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; z-index: 10; }
        
        /* Header */
        header { padding: 55px 24px 10px; border-bottom: 1px solid #eaeaea; display: flex; justify-content: space-between; align-items: flex-end; }
        .logo-container { display: flex; flex-direction: column; }
        .school-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0px; }
        .irl-logo { font-size: 28px; font-weight: 900; line-height: 1; margin-top: 2px;}
        .envelope-icon { width: 28px; height: 28px; fill: none; stroke: #000; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 4px; }
        
        main { flex: 1; padding: 0; overflow-y: auto; }
        
        .title-container { padding: 30px 24px 10px; text-align: center; }
        .main-title { color: #D82B2B; font-size: 26px; font-weight: 800; letter-spacing: 1px; }
        .sub-title { font-size: 18px; font-weight: 800; text-align: left; margin-top: 15px; }
        
        /* Message List */
        .message-list { display: flex; flex-direction: column; }
        .message-item { display: flex; align-items: center; padding: 20px 24px; border-bottom: 1px solid #eaeaea; cursor: pointer; text-decoration: none; color: inherit; }
        .message-item:hover { background-color: #f9f9f9; }
        .avatar { width: 60px; height: 60px; background-color: #e0e0e0; border-radius: 50%; flex-shrink: 0; }
        .msg-info { flex: 1; margin-left: 15px; display: flex; flex-direction: column; gap: 4px; }
        .msg-name { font-size: 16px; font-weight: 800; }
        .msg-time { font-size: 13px; font-weight: 600; color: #666; }
        .more-dots { font-size: 24px; font-weight: 700; color: #000; letter-spacing: 2px; line-height: 1; margin-bottom: 10px;}

        /* Bottom Nav */
        .bottom-nav { background-color: #000; height: 70px; display: flex; justify-content: space-around; align-items: center; padding: 0 15px; position: relative; border-bottom-left-radius: 32px; border-bottom-right-radius: 32px; flex-shrink: 0;}
        .nav-item { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: inherit; text-decoration: none; }
        .nav-icon { width: 26px; height: 26px; stroke: #fff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .nav-icon.home-btn { stroke-width: 1.5; }
        .nav-icon.chat-btn { stroke-width: 1.5; }
        .nav-icon.search-btn { stroke-width: 1.8; }
        .nav-icon.active { stroke: #D82B2B; }
    </style>
</head>
<body>
    <div class="screen-container">
        <div class="notch"></div>
        
        <header>
            <div class="logo-container">
                <div class="school-title">THE NEW SCHOOL</div>
                <div class="irl-logo">IRL</div>
            </div>
            <svg class="envelope-icon" viewBox="0 0 24 24">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
        </header>

        <main>
            <div class="title-container">
                <h1 class="main-title">MESSAGES</h1>
                <h2 class="sub-title">Messages</h2>
            </div>

            <div class="message-list">
                <a href="chat.html" class="message-item">
                    <div class="avatar"></div>
                    <div class="msg-info">
                        <div class="msg-name">Tsunemasa Fujiwara</div>
                        <div class="msg-time">Sent 2h ago</div>
                    </div>
                    <div class="more-dots">...</div>
                </a>
                <a href="chat.html" class="message-item">
                    <div class="avatar"></div>
                    <div class="msg-info">
                        <div class="msg-name">Akshi Maiti</div>
                        <div class="msg-time">Sent 5h ago</div>
                    </div>
                    <div class="more-dots">...</div>
                </a>
                <a href="chat.html" class="message-item">
                    <div class="avatar"></div>
                    <div class="msg-info">
                        <div class="msg-name">Ronish Sharma</div>
                        <div class="msg-time">Sent 10h ago</div>
                    </div>
                    <div class="more-dots">...</div>
                </a>
                <a href="chat.html" class="message-item">
                    <div class="avatar"></div>
                    <div class="msg-info">
                        <div class="msg-name">Carla Budar</div>
                        <div class="msg-time">Seen just now</div>
                    </div>
                    <div class="more-dots">...</div>
                </a>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="#" class="nav-item">
                <svg class="nav-icon home-btn" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <a href="messages.html" class="nav-item">
                <svg class="nav-icon chat-btn active" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            </a>
            <a href="#" class="nav-item">
                <svg class="nav-icon search-btn" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </a>
            <a href="#" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            </a>
            <a href="index.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="10" r="3"></circle><path d="M17 19a5 5 0 0 0-10 0"></path></svg>
            </a>
        </nav>
    </div>
</body>
</html>
