<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Report – Who are they pretending to be?</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div class="app-shell">
    <!-- Top bar -->
    <header class="top-bar">
      <div class="logo-block">
        <span class="logo-top">THE NEW SCHOOL</span>
        <span class="logo-bottom">IRL</span>
      </div>
      <button class="icon-button" aria-label="Inbox / Messages">
        <span class="envelope"></span>
      </button>
    </header>

    <main class="report-main">
      <h1 class="page-title">Report</h1>

      <section class="report-section">
        <h2 class="report-question">Who are they pretending to be?</h2>
        <p class="report-subtext">
          Select a person they are impersonating.
        </p>

        <div class="report-search-wrap">
          <div class="report-search-field">
            <span class="report-search-icon">🔍</span>
            <input
              type="text"
              class="report-search-input"
              placeholder="Search"
            />
          </div>
        </div>

        <button class="report-next-button">SUBMIT REPORT</button>
      </section>
    </main>
  </div>
</body>
</html>
